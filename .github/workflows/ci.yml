# Quality gates per CLAUDE.md: lint (pint --test), type_check (phpstan analyse),
# test (php artisan test). PHP minor matches local dev (8.5; repo floor is >= 8.4).
# PHPStan memory comes from the committed phpstan-bootstrap.php — no flag needed.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, curl, dom, fileinfo, filter, iconv, intl, mbstring, openssl, pdo_sqlite, session, simplexml, sqlite3, tokenizer, xml, xmlreader, xmlwriter, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse

      - name: Tests (Pest on in-memory SQLite)
        run: php artisan test
